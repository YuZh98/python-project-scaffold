name: Plugin smoke

on:
  pull_request:
    paths:
      - "plugins/**"
      - ".claude-plugin/**"
      - "tests/skills/**"
      - ".github/workflows/plugin-smoke.yml"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - name: Install pytest (runner needs it to invoke the smoke test)
        run: python -m pip install --upgrade pip pytest
      - name: Run plugin smoke tests
        run: pytest tests/skills/ -v
      - name: Normalize-check plugin CHANGELOG (informational)
        continue-on-error: true
        run: |
          python3 plugins/new-project/skills/changelog-normalizer/scripts/normalize_changelog.py \
            plugins/new-project/CHANGELOG.md --diff
