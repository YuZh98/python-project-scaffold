name: Build and publish skill package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Build .skill package
        run: |
          mkdir -p dist
          bash tooling/claude-code/scripts/package.sh dist
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "Release $TAG" --notes ""
          gh release upload "$TAG" dist/new-project.skill --clobber
